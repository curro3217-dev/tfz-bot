name: TFZ Bot Paper

# SIN TOKEN: en repos publicos los Actions son gratis e ILIMITADOS y un run puede durar
# hasta 6h. En vez de depender de un re-lanzado, cada run corre ~5h40m (un ciclo cada
# 5 min). El cron re-encola cada 30 min (en :17 y :47, minutos "tranquilos" para esquivar
# la saturacion de GitHub a en punto). Con concurrency, si salta el cron mientras corre un
# run, queda en cola y arranca en cuanto el run acaba -> cobertura casi continua, sin PAT.
on:
  workflow_dispatch:
  schedule:
    - cron: "8,21,34,47 * * * *"   # 4 intentos/hora en minutos repartidos (el cron de
                                   # GitHub es poco fiable; mas intentos = mas chance de saltar)

# Permite que el job suba (commit/push) el estado del paper al repo.
permissions:
  contents: write

# Solo un run a la vez; si salta otro mientras, queda en cola (no se cancela el activo).
concurrency:
  group: tfz-paper
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # Medicion forward del momentum viernes->sabado (cuenta REDUNDANTE a la del PC,
      # por si el PC esta apagado el domingo). Idempotente (INSERT OR IGNORE +
      # forward-only), 1 vez por run (~cada 6h) basta. Se sube con github_state/.
      - name: Weekend paper (vie->sab, medicion forward)
        env:
          PYTHONIOENCODING: utf-8
          TFZ_WKND_DB: github_state/weekend_paper.db
        run: |
          mkdir -p github_state
          python weekend_paper.py || echo "weekend_paper fallo, sigo"

      # Prima de Coinbase (BTC/USD Coinbase vs BTC/USDT MEXC; Binance esta
      # geo-bloqueado aqui). Episodios z>=+1 -> long BTC 7d. Idempotente.
      - name: Premium paper (prima Coinbase, medicion forward)
        env:
          PYTHONIOENCODING: utf-8
          TFZ_PREM_DB: github_state/premium_paper.db
        run: |
          python premium_paper.py || echo "premium_paper fallo, sigo"

      - name: Bucle de paper (~5h40m, un ciclo cada 5 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
          TZ: Europe/Madrid
          # Cuenta paper SEPARADA de la del PC -> se pueden comparar en paralelo.
          # MEXC es la fuente (default en config) -> funciona desde GitHub.
          TFZ_DB: github_state/tfz_data.db
          TFZ_PORTF: github_state/portfolio_state.json
          # MODO ASISTENTE: SOLO GitHub envia las alertas de setups a Telegram (el PC
          # queda mudo para no duplicar avisos). Fuerza el envio pese a ALERTS_PAUSED.
          TFZ_TELEGRAM: "1"
        run: |
          git config user.name "tfz-bot"
          git config user.email "tfz-bot@users.noreply.github.com"
          mkdir -p github_state
          END=$((SECONDS + 20400))   # ~5h40m (buffer bajo el timeout de 350 min)
          i=0
          while [ $SECONDS -lt $END ]; do
            i=$((i + 1))
            echo "===== ciclo $i ($(date +%H:%M:%S) hora local) ====="
            python main.py paper \
              --timeframe 15m,1h --fresh 3 \
              --filter profit --min-score 60 --min-rr 6 \
              --enable-f1 --f1-retest || echo "ciclo fallo, sigo"
            # Recolector de microestructura cada 3 ciclos (~15 min), cuenta propia de
            # GitHub. Asi el PC NO necesita estar encendido para recolectar.
            if [ $((i % 3)) -eq 1 ]; then
              TFZ_MICRO_DB=github_state/micro_data.db python micro_collector.py \
                || echo "collector fallo, sigo"
            fi
            # Subir el estado de ESTA cuenta (carpeta github_state). En .gitignore -> -f.
            git add -f github_state/ 2>/dev/null || true
            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "estado paper ciclo $i [skip ci]" || true
              for try in 1 2 3; do
                git pull --rebase --autostash && git push && break || sleep 5
              done
            fi
            [ $SECONDS -lt $END ] && sleep 300
          done
          echo "fin del bucle: $i ciclos"
