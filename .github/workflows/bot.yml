name: TFZ Bot Paper

# AUTO-RELANZADO: al terminar, cada run lanza el siguiente via workflow_dispatch con un
# PAT (secret GH_PAT) -> corre solo cada ~hora SIN depender del cron de GitHub (que es
# poco fiable y a veces no salta). El cron de GitHub queda de respaldo por si el PAT falta.
on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"   # respaldo (el cron de GitHub puede retrasarse o no saltar)

# Permite que el job suba (commit/push) el estado del paper al repo.
permissions:
  contents: write

# Evita que dos ejecuciones se solapen.
concurrency:
  group: tfz-paper
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Bucle de paper (~50 min, un ciclo cada 5 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
          # Cuenta paper SEPARADA de la del PC -> se pueden comparar en paralelo.
          # MEXC es la fuente (default en config) -> funciona desde GitHub.
          TFZ_DB: github_state/tfz_data.db
          TFZ_PORTF: github_state/portfolio_state.json
        run: |
          git config user.name "tfz-bot"
          git config user.email "tfz-bot@users.noreply.github.com"
          mkdir -p github_state
          END=$((SECONDS + 3000))   # parar a los 50 min (dentro del timeout de 58)
          i=0
          while [ $SECONDS -lt $END ]; do
            i=$((i + 1))
            echo "===== ciclo $i ($(date -u +%H:%M:%S) UTC) ====="
            python main.py paper \
              --timeframe 1m,5m,15m --fresh 3 \
              --filter profit --min-score 60 --min-rr 6 \
              --enable-f1 --f1-retest || echo "ciclo fallo, sigo"
            # Subir el estado de ESTA cuenta (carpeta github_state). En .gitignore -> -f.
            git add -f github_state/ 2>/dev/null || true
            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "estado paper ciclo $i [skip ci]" || true
              for try in 1 2 3; do
                git pull --rebase --autostash && git push && break || sleep 5
              done
            fi
            [ $SECONDS -lt $END ] && sleep 300
          done
          echo "fin del bucle: $i ciclos"

      - name: Auto-relanzar el siguiente run (cada ~hora, sin depender del cron de GitHub)
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            echo "Re-lanzando el proximo run via workflow_dispatch..."
            code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot.yml/dispatches" \
              -d '{"ref":"main"}')
            if [ "$code" = "204" ]; then echo "OK: siguiente run encolado"; else echo "fallo el re-lanzamiento (HTTP $code) - revisa el PAT"; fi
          else
            echo "SIN secret GH_PAT -> no puedo auto-relanzar; dependera del cron de GitHub (poco fiable)."
            echo "Anade un PAT (Fine-grained, permiso Actions: Read & Write) como secret GH_PAT."
          fi
