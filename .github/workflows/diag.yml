name: TFZ Diag Red
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ccxt
      - run: python diag_net.py
