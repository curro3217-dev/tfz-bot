name: TFZ Diag Regiones Bybit
on:
  workflow_dispatch:
  push:
    paths:
      - diag_regions.py
      - .github/workflows/diag_regions.yml
permissions:
  contents: write
jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ejecutar test y guardar resultado
        run: python diag_regions.py | tee diag_regions_result.txt
      - name: Subir resultado al repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f diag_regions_result.txt
          git commit -m "diag: resultado test regiones [skip ci]" || echo "sin cambios"
          git push
