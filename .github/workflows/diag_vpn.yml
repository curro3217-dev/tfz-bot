name: TFZ Diag VPN
on:
  workflow_dispatch:
  push:
    paths:
      - vpn_pick.py
      - diag_vpn_after.py
      - .github/workflows/diag_vpn.yml
permissions:
  contents: write
jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar openvpn
        run: sudo apt-get update && sudo apt-get install -y openvpn
      - name: Elegir servidor VPN gratis (Japon)
        run: python vpn_pick.py JP
      - name: Conectar la VPN (con cifrados viejos habilitados)
        run: |
          sudo openvpn --config vpn.ovpn --daemon --log vpn.log --writepid vpn.pid \
            --data-ciphers-fallback BF-CBC \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:AES-256-CBC:AES-128-CBC:BF-CBC' \
            --connect-retry-max 5 --connect-timeout 25 --allow-compression yes || true
          echo "esperando al tunel tun0..."
          for i in $(seq 1 60); do
            if ip a 2>/dev/null | grep -q tun0; then echo "tun0 ARRIBA"; break; fi
            sleep 2
          done
          sleep 6
      - name: Probar Binance/Bybit a traves de la VPN
        run: python diag_vpn_after.py | tee diag_vpn_result.txt
      - name: Desconectar VPN y subir resultado (con diagnostico)
        if: always()
        run: |
          echo "" >> diag_vpn_result.txt
          echo "--- diagnostico tunel ---" >> diag_vpn_result.txt
          (ip a 2>/dev/null | grep -q tun0 && echo "tun0: ARRIBA" || echo "tun0: NO SUBIO") >> diag_vpn_result.txt
          echo "--- vpn.log (ultimas lineas) ---" >> diag_vpn_result.txt
          tail -18 vpn.log >> diag_vpn_result.txt 2>/dev/null || echo "(sin log)" >> diag_vpn_result.txt
          sudo killall openvpn || true
          sleep 4
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f diag_vpn_result.txt || true
          git commit -m "diag: resultado VPN [skip ci]" || echo "sin cambios"
          git push || true
