name: TFZ Selftest

# Prueba de reproducibilidad: corre selftest.py (mismas velas hasta una hora fija)
# y muestra el HASH. Debe coincidir con el hash de tu PC -> el bot opera igual.
on:
  workflow_dispatch:

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar selftest
        run: python selftest.py
